<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>{% block title %}BabyGram 🍼{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- Štýly -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ── TOP BAR ────────────────────────────────────────────────────────── -->
  <header class="top-bar">
    <a href="/feed" class="brand">BabyGram <span>🍼</span></a>
    <div class="top-actions">
      {% if session.get('username') %}
        <span class="top-username">@{{ session['username'] }}</span>
        <a href="/logout" class="logout-btn" title="Odhlásiť">
          <i class="bi bi-box-arrow-right"></i>
        </a>
      {% endif %}
    </div>
  </header>

  <!-- ── OBSAH ──────────────────────────────────────────────────────────── -->
  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── SPODNÁ NAVIGÁCIA ───────────────────────────────────────────────── -->
  {% if session.get('user_id') %}
  <nav class="bottom-nav">
    <a href="/feed"   class="nav-item {% if request.endpoint=='feed'    %}active{% endif %}">
      <i class="bi bi-house-heart{% if request.endpoint=='feed' %}-fill{% endif %}"></i>
      <span>Feed</span>
    </a>
    <a href="/reels"  class="nav-item {% if request.endpoint=='reels'   %}active{% endif %}">
      <i class="bi bi-play-circle{% if request.endpoint=='reels' %}-fill{% endif %}"></i>
      <span>Reels</span>
    </a>
    <a href="/chat"   class="nav-item {% if request.endpoint in ('chat',) %}active{% endif %}">
      <i class="bi bi-chat-heart{% if request.endpoint=='chat' %}-fill{% endif %}"></i>
      <span>Chat</span>
    </a>
    <a href="/profile" class="nav-item {% if request.endpoint=='profile'  %}active{% endif %}">
      <i class="bi bi-person-circle"></i>
      <span>Profil</span>
    </a>
  </nav>
  {% endif %}

  <!-- Socket.IO client (načítava sa vždy, ale pripája len na chat stránke) -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
